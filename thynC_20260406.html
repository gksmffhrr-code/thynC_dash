<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

    // 내장된 데이터를 파싱해서 불러옵니다.
    const getInitialData = () => {
      try {
        return JSON.parse(document.getElementById('dashboard-data').textContent);
      } catch (e) {
        console.error("데이터 파싱 오류", e);
        return [];
      }
    };

    function App() {
      const [rawData, setRawData] = useState(getInitialData());
      const [currentLevel, setCurrentLevel] = useState('TOTAL');
      const [filters, setFilters] = useState({ division: null, branch: null, manager: null });

      const parseCSV = (csvText) => {
        const lines = csvText.split(/\r?\n/);
        if (lines.length < 2) return [];

        const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
        const data = [];

        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;

          let row = [];
          let inQuotes = false;
          let currentVal = '';

          for (let char of lines[i]) {
            if (char === '"') {
              inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
              row.push(currentVal.replace(/^"|"$/g, '').trim());
              currentVal = '';
            } else {
              currentVal += char;
            }
          }
          row.push(currentVal.replace(/^"|"$/g, '').trim());

          if (row.length > 0) {
            const obj = {};
            headers.forEach((header, index) => {
              obj[header] = row[index] || '';
            });
            data.push(obj);
          }
        }
        return data;
      };

      const handleFileUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const parsedData = parseCSV(text);
          if (parsedData.length > 0) {
            setRawData(parsedData);
            setCurrentLevel('TOTAL');
            setFilters({ division: null, branch: null, manager: null });
          }
        };
        reader.readAsText(file, "UTF-8");
      };

      // 공유용 HTML 파일 내보내기 로직
      const handleExportHTML = () => {
        // 1. 현재 HTML 구조 복제
        const clone = document.documentElement.cloneNode(true);
        
        // 2. React 렌더링 영역 초기화 (다음 실행 시 깔끔하게 동작하도록)
        const rootDiv = clone.querySelector('#root');
        if (rootDiv) rootDiv.innerHTML = '';
        
        // 3. 갱신된 최신 데이터를 <script> 태그 안에 박아넣기!
        const dataScript = clone.querySelector('#dashboard-data');
        if (dataScript) dataScript.textContent = JSON.stringify(rawData, null, 2);
        
        // 4. 완벽한 단일 HTML 문자열로 재구성
        const htmlContent = '<!DOCTYPE html>\n' + clone.outerHTML;
        
        // 5. 파일 다운로드 트리거
        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date();
        const dateStr = `${today.getFullYear()}${(today.getMonth()+1).toString().padStart(2,'0')}${today.getDate().toString().padStart(2,'0')}`;
        
        a.href = url;
        a.download = `thynC_대시보드_${dateStr}.html`; // 예: thynC_대시보드_20260406.html
        a.click();
        URL.revokeObjectURL(url);
      };

      // 1단계: 병원명 기준 중복 합산 및 누적 데이터 추출
      const processedHospitals = useMemo(() => {
        if (!rawData || rawData.length === 0) return [];
        
        const hMap = {};
        const headers = Object.keys(rawData[0]);
        
        const rateCols = headers.filter(h => h.includes('가동률') && !h.includes('누적'));
        const cumulativeCol = headers.find(h => h.includes('누적') && h.includes('가동률'));

        const allowedDivisions = ['서울1', '서울2', '지방1', '지방2'];

        rawData.forEach(row => {
          const name = row['병원명'];
          const division = row['사업부'] || '';
          
          if (!name || !allowedDivisions.includes(division)) return;
          
          if (!hMap[name]) {
            hMap[name] = {
              hospital: name,
              division: division,
              branch: row['사무소'] || '',
              manager: row['담당자'] || '',
              monthlyRatesSeq: [],
              cumulativeRatesSeq: [] 
            };
          }
          
          const seq = [];
          rateCols.forEach(col => {
            const val = row[col];
            if (val !== undefined && val !== null && val.toString().trim() !== '') {
              let num = parseFloat(val);
              if (!isNaN(num)) {
                if (num > 0 && num <= 1) num = num * 100;
                seq.push(num);
              }
            }
          });
          if (seq.length > 0) hMap[name].monthlyRatesSeq.push(seq);

          if (cumulativeCol) {
            const cumVal = row[cumulativeCol];
            if (cumVal !== undefined && cumVal !== null && cumVal.toString().trim() !== '') {
               let cNum = parseFloat(cumVal);
               if (!isNaN(cNum)) {
                 if (cNum > 0 && cNum <= 1) cNum = cNum * 100;
                 hMap[name].cumulativeRatesSeq.push(cNum);
               }
            }
          }
        });

        const finalHospitals = Object.values(hMap).map(h => {
          const maxLen = Math.max(...h.monthlyRatesSeq.map(s => s.length), 0);
          const avgSeq = [];
          for (let i = 0; i < maxLen; i++) {
            let sum = 0; let count = 0;
            h.monthlyRatesSeq.forEach(seq => {
              if (seq[i] !== undefined) { sum += seq[i]; count++; }
            });
            avgSeq.push(count > 0 ? sum / count : null);
          }

          let cumSum = 0; let cumCount = 0;
          h.cumulativeRatesSeq.forEach(val => { cumSum += val; cumCount++; });
          const avgCumulativeRate = cumCount > 0 ? cumSum / cumCount : 0;

          return { ...h, avgSeq, maxMonths: maxLen, avgCumulativeRate };
        }).filter(h => h.maxMonths > 0);

        return finalHospitals;
      }, [rawData]);

      // 2단계: 필터 적용 및 차트/테이블/하위그룹 데이터 생성
      const { chartData, maxMonths, subGroups, kpi, filteredHospitals } = useMemo(() => {
        let filtered = processedHospitals;
        if (filters.division) filtered = filtered.filter(h => h.division === filters.division);
        if (filters.branch) filtered = filtered.filter(h => h.branch === filters.branch);
        if (filters.manager) filtered = filtered.filter(h => h.manager === filters.manager);

        let localMaxMonths = 0;
        let totalCumSum = 0;
        
        filtered.forEach(h => { 
          if (h.maxMonths > localMaxMonths) localMaxMonths = h.maxMonths; 
          totalCumSum += h.avgCumulativeRate;
        });

        const parsedChartData = [];
        let highestAvgRate = 0;
        for (let i = 0; i < localMaxMonths; i++) {
          let mSum = 0; let mCount = 0;
          filtered.forEach(h => {
            if (h.avgSeq[i] !== undefined && h.avgSeq[i] !== null) {
              mSum += h.avgSeq[i];
              mCount++;
            }
          });
          if (mCount > 0) {
            const avg = Number((mSum / mCount).toFixed(2));
            if (avg > highestAvgRate) highestAvgRate = avg;
            parsedChartData.push({
              monthLabel: `${i + 1}개월 차`,
              monthIndex: i + 1,
              averageRate: avg,
              hospitalCount: mCount
            });
          }
        }

        const overallCumAvg = filtered.length > 0 ? Number((totalCumSum / filtered.length).toFixed(2)) : 0;

        const subGroupsMap = {};
        let nextLevelKey = '';
        if (currentLevel === 'TOTAL') nextLevelKey = 'division';
        else if (currentLevel === 'DIVISION') nextLevelKey = 'branch';
        else if (currentLevel === 'BRANCH') nextLevelKey = 'manager';

        if (nextLevelKey) {
          filtered.forEach(h => {
            const key = h[nextLevelKey] || '기타';
            if (!subGroupsMap[key]) {
              subGroupsMap[key] = { name: key, count: 0, cumSum: 0 };
            }
            subGroupsMap[key].count++;
            subGroupsMap[key].cumSum += h.avgCumulativeRate;
          });
        }

        const parsedSubGroups = Object.values(subGroupsMap).map(g => ({
          name: g.name,
          hospitalCount: g.count,
          averageCumulativeRate: g.count > 0 ? Number((g.cumSum / g.count).toFixed(2)) : 0
        }));

        if (currentLevel === 'TOTAL') {
          const divisionOrder = { '서울1': 1, '서울2': 2, '지방1': 3, '지방2': 4 };
          parsedSubGroups.sort((a, b) => (divisionOrder[a.name] || 99) - (divisionOrder[b.name] || 99));
        } else {
          parsedSubGroups.sort((a, b) => b.averageCumulativeRate - a.averageCumulativeRate);
        }

        filtered.sort((a, b) => b.avgCumulativeRate - a.avgCumulativeRate);

        return {
          filteredHospitals: filtered,
          chartData: parsedChartData,
          maxMonths: localMaxMonths,
          subGroups: parsedSubGroups,
          kpi: {
            totalHospitals: filtered.length,
            overallCumAvg,
            highestAvgRate
          }
        };
      }, [processedHospitals, filters, currentLevel]);

      const handleDrillDown = (name) => {
        if (currentLevel === 'TOTAL') {
          setFilters({ ...filters, division: name });
          setCurrentLevel('DIVISION');
        } else if (currentLevel === 'DIVISION') {
          setFilters({ ...filters, branch: name });
          setCurrentLevel('BRANCH');
        } else if (currentLevel === 'BRANCH') {
          setFilters({ ...filters, manager: name });
          setCurrentLevel('MANAGER');
        }
      };

      const handleBreadcrumbClick = (level) => {
        if (level === 'TOTAL') {
          setFilters({ division: null, branch: null, manager: null });
          setCurrentLevel('TOTAL');
        } else if (level === 'DIVISION') {
          setFilters({ division: filters.division, branch: null, manager: null });
          setCurrentLevel('DIVISION');
        } else if (level === 'BRANCH') {
          setFilters({ division: filters.division, branch: filters.branch, manager: null });
          setCurrentLevel('BRANCH');
        }
      };

      const getTrend = (seq) => {
        const valid = seq.filter(v => v !== null && v !== undefined);
        if (valid.length >= 2) {
          const diff = valid[valid.length - 1] - valid[valid.length - 2];
          if (diff > 0) return 'up';
          if (diff < 0) return 'down';
          return 'flat';
        }
        return 'none';
      };

      const CustomTooltip = ({ active, payload, label }) => {
        if (active && payload && payload.length) {
          return (
            <div className="bg-white p-4 border border-gray-200 shadow-lg rounded-lg">
              <p className="font-bold text-gray-800 mb-1">{label}</p>
              <p className="text-[#F37321] font-semibold">
                월차 평균 가동률: {payload[0].value}%
              </p>
              <p className="text-gray-500 text-sm mt-1">
                가동 중인 병원: {payload[0].payload.hospitalCount}곳
              </p>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-800 p-6 pb-20 relative">
          
          {/* 🚀 PM님 전용 컨트롤 패널 (데이터 업로드 & 공유용 HTML 다운로드) 🚀 */}
          <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-50 opacity-20 hover:opacity-100 transition-all duration-300">
            <button 
              onClick={handleExportHTML}
              className="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-lg border border-blue-200 hover:bg-blue-50 cursor-pointer group"
              title="현재 최신 데이터가 내장된 HTML 파일로 저장하여 팀원에게 공유하기"
            >
              <i className="fa-solid fa-download text-blue-600 text-xl group-hover:scale-110 transition-transform"></i>
            </button>
            <label 
              className="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-lg border border-orange-200 hover:bg-orange-50 cursor-pointer group"
              title="최신 CSV 데이터 파일 업데이트하기"
            >
              <i className="fa-solid fa-cloud-arrow-up text-[#F37321] text-xl group-hover:scale-110 transition-transform"></i>
              <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
            </label>
          </div>

          <div className="max-w-7xl mx-auto space-y-6">
            
            {/* 헤더 섹션 */}
            <div className="flex flex-col md:flex-row md:items-center justify-between bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <div>
                <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-3">
                  <i className="fa-solid fa-chart-line text-[#F37321] text-3xl"></i>
                  thynC 도입월차별 가동율 변화 대시보드
                </h1>
              </div>
            </div>

            {/* 내비게이션 Breadcrumbs */}
            <div className="flex flex-wrap items-center gap-2 text-sm text-gray-600 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
              <span 
                className={`cursor-pointer transition-colors ${currentLevel === 'TOTAL' ? 'font-bold text-[#F37321] bg-orange-50 px-3 py-1 rounded-full' : 'hover:text-[#F37321] px-3 py-1'}`}
                onClick={() => handleBreadcrumbClick('TOTAL')}
              >
                병원본부
              </span>
              
              {(filters.division || currentLevel !== 'TOTAL') && <i className="fa-solid fa-chevron-right text-[10px] text-gray-400"></i>}
              {filters.division && (
                <span 
                  className={`cursor-pointer transition-colors ${currentLevel === 'DIVISION' ? 'font-bold text-[#F37321] bg-orange-50 px-3 py-1 rounded-full' : 'hover:text-[#F37321] px-3 py-1'}`}
                  onClick={() => handleBreadcrumbClick('DIVISION')}
                >
                  {filters.division}
                </span>
              )}

              {(filters.branch || currentLevel === 'BRANCH' || currentLevel === 'MANAGER') && filters.division && <i className="fa-solid fa-chevron-right text-[10px] text-gray-400"></i>}
              {filters.branch && (
                <span 
                  className={`cursor-pointer transition-colors ${currentLevel === 'BRANCH' ? 'font-bold text-[#F37321] bg-orange-50 px-3 py-1 rounded-full' : 'hover:text-[#F37321] px-3 py-1'}`}
                  onClick={() => handleBreadcrumbClick('BRANCH')}
                >
                  {filters.branch}
                </span>
              )}

              {currentLevel === 'MANAGER' && filters.branch && <i className="fa-solid fa-chevron-right text-[10px] text-gray-400"></i>}
              {filters.manager && (
                <span className="font-bold text-[#F37321] bg-orange-50 px-3 py-1 rounded-full">
                  {filters.manager} 담당자
                </span>
              )}
            </div>

            {/* 하위 그룹 드릴다운 카드 */}
            {currentLevel !== 'MANAGER' && subGroups.length > 0 && (
              <div className="space-y-3">
                <div className="flex items-center justify-between px-1">
                  <h3 className="text-sm font-bold text-gray-600 flex items-center gap-2">
                    <i className="fa-solid fa-layer-group text-[#F37321]"></i>
                    {currentLevel === 'TOTAL' ? '사업부별' : currentLevel === 'DIVISION' ? '사무소별' : '담당자별'} 현황 <span className="font-normal text-gray-400">(클릭하여 상세 조회)</span>
                  </h3>
                  <div className="flex items-center gap-1.5 px-2.5 py-1 bg-green-50 text-green-700 text-xs font-bold rounded-md border border-green-200">
                    <i className="fa-solid fa-chart-column"></i>
                    누적 가동률 지표 적용됨
                  </div>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {subGroups.map((group) => (
                    <div 
                      key={group.name}
                      onClick={() => handleDrillDown(group.name)}
                      className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 cursor-pointer hover:border-[#F37321] hover:shadow-md hover:-translate-y-0.5 transition-all group"
                    >
                      <div className="flex justify-between items-start mb-4">
                        <span className="font-bold text-gray-800 group-hover:text-[#F37321] transition-colors flex items-center gap-1.5">
                          {currentLevel === 'TOTAL' && <i className="fa-solid fa-bullseye text-gray-400 text-sm"></i>}
                          {currentLevel === 'DIVISION' && <i className="fa-solid fa-location-dot text-gray-400 text-sm"></i>}
                          {currentLevel === 'BRANCH' && <i className="fa-solid fa-users text-gray-400 text-sm"></i>}
                          {group.name}
                        </span>
                        <i className="fa-solid fa-chevron-right text-gray-300 text-sm group-hover:text-[#F37321]"></i>
                      </div>
                      <div className="flex justify-between items-end">
                        <div className="flex flex-col">
                          <span className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-0.5">누적 가동률</span>
                          <span className="text-2xl font-black text-[#F37321]">{group.averageCumulativeRate}%</span>
                        </div>
                        <span className="text-xs text-gray-500 mb-1">병원 <b className="text-gray-700">{group.hospitalCount}</b>곳</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* KPI 요약 카드 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                <div className="p-4 bg-blue-50 rounded-xl text-blue-600 w-14 h-14 flex items-center justify-center">
                  <i className="fa-regular fa-hospital text-2xl"></i>
                </div>
                <div>
                  <p className="text-sm text-gray-500 font-medium">현재 필터 내 총 병원 수</p>
                  <p className="text-3xl font-bold text-gray-900">{kpi.totalHospitals}<span className="text-lg font-normal text-gray-500 ml-1">곳</span></p>
                </div>
              </div>
              <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                <div className="p-4 bg-green-50 rounded-xl text-green-600 w-14 h-14 flex items-center justify-center">
                  <i className="fa-solid fa-chart-column text-2xl"></i>
                </div>
                <div>
                  <p className="text-sm text-gray-500 font-medium">현재 필터 <b className="text-green-700">누적 가동률 평균</b></p>
                  <p className="text-3xl font-bold text-gray-900">{kpi.overallCumAvg}<span className="text-lg font-normal text-gray-500 ml-1">%</span></p>
                </div>
              </div>
              <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                <div className="p-4 bg-orange-50 rounded-xl text-[#F37321] w-14 h-14 flex items-center justify-center">
                  <i className="fa-solid fa-arrow-trend-up text-2xl"></i>
                </div>
                <div>
                  <p className="text-sm text-gray-500 font-medium">월차별 곡선 최고 평균 가동률</p>
                  <p className="text-3xl font-bold text-gray-900">{kpi.highestAvgRate}<span className="text-lg font-normal text-gray-500 ml-1">%</span></p>
                </div>
              </div>
            </div>

            {/* 차트 영역 */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                  <i className="fa-solid fa-chart-line text-[#F37321]"></i>
                  {filters.manager ? `${filters.manager} 담당자` : filters.branch ? `${filters.branch} 사무소` : filters.division ? `${filters.division} 사업부` : '병원본부'} 도입 경과 월차별 가동률 변화 추이
                </h2>
              </div>
              
              <div className="h-96 w-full mt-4">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={chartData} margin={{ top: 20, right: 30, left: 0, bottom: 20 }}>
                    <defs>
                      <linearGradient id="colorRate" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor="#F37321" stopOpacity={0.3}/>
                        <stop offset="95%" stopColor="#F37321" stopOpacity={0}/>
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                    <XAxis 
                      dataKey="monthLabel" 
                      axisLine={false} 
                      tickLine={false} 
                      tick={{ fill: '#6b7280', fontWeight: 500 }} 
                      dy={10}
                    />
                    <YAxis 
                      axisLine={false} 
                      tickLine={false} 
                      tick={{ fill: '#6b7280' }}
                      tickFormatter={(val) => `${val}%`}
                    />
                    <Tooltip content={<CustomTooltip />} />
                    <Area 
                      type="monotone" 
                      dataKey="averageRate" 
                      stroke="#F37321" 
                      strokeWidth={4}
                      fillOpacity={1} 
                      fill="url(#colorRate)" 
                      activeDot={{ r: 8, strokeWidth: 0, fill: '#F37321' }}
                      animationDuration={800}
                    />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* 상세 데이터 테이블 */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-6 border-b border-gray-100 flex flex-col md:flex-row md:items-center justify-between bg-gray-50/50 gap-4">
                <div>
                  <h2 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                    <i className="fa-solid fa-file-excel text-gray-500"></i>
                    세부 병원별 도입 월차별 가동률 현황 
                  </h2>
                  <p className="text-sm text-gray-500 mt-1 flex items-center gap-1.5">
                    <i className="fa-solid fa-chart-column text-green-600"></i>
                    <span className="font-semibold text-green-700">누적 가동률이 높은 순</span>으로 정렬되어 있습니다.
                  </p>
                </div>
                {/* 범례 */}
                <div className="flex items-center gap-3 text-xs font-medium text-gray-600 bg-white px-3 py-2 rounded-lg border border-gray-200 shadow-sm">
                  <div className="flex items-center gap-1"><i className="fa-solid fa-circle-exclamation text-red-500"></i>40% 미만 주의</div>
                  <div className="flex items-center gap-1"><i className="fa-solid fa-arrow-trend-up text-blue-500"></i>가동률 상승중</div>
                  <div className="flex items-center gap-1"><i className="fa-solid fa-arrow-trend-down text-red-500"></i>가동률 하락중</div>
                </div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="text-xs text-gray-600 uppercase bg-gray-100/80 border-b border-gray-200">
                    <tr>
                      <th className="px-5 py-4 font-bold">사업부</th>
                      <th className="px-5 py-4 font-bold text-[#F37321]">사무소</th>
                      <th className="px-5 py-4 font-bold">담당자</th>
                      <th className="px-5 py-4 font-bold">병원명</th>
                      <th className="px-5 py-4 font-extrabold text-green-700 border-l-2 border-green-200 bg-green-50/50">누적 가동률</th>
                      {Array.from({ length: maxMonths }, (_, i) => (
                        <th key={`th-month-${i}`} className="px-4 py-4 text-center font-bold text-gray-700 whitespace-nowrap border-l border-gray-200">
                          {i + 1}개월 차
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {filteredHospitals.map((row, idx) => {
                      const trend = getTrend(row.avgSeq);
                      const isCumWarning = row.avgCumulativeRate !== null && row.avgCumulativeRate !== undefined && row.avgCumulativeRate < 40;
                      
                      return (
                        <tr key={idx} className="hover:bg-orange-50/40 transition-colors">
                          <td className="px-5 py-3 text-gray-600 whitespace-nowrap">{row.division}</td>
                          <td className="px-5 py-3 font-medium text-gray-800 whitespace-nowrap">{row.branch}</td>
                          <td className="px-5 py-3 text-gray-600 whitespace-nowrap">{row.manager}</td>
                          <td className="px-5 py-3 font-bold text-gray-900 whitespace-nowrap">
                            <div className="flex items-center gap-2">
                              {row.hospital}
                              {trend === 'up' && <span className="flex items-center gap-1 text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded border border-blue-100"><i className="fa-solid fa-arrow-trend-up"></i>상승중</span>}
                              {trend === 'down' && <span className="flex items-center gap-1 text-[10px] bg-red-50 text-red-600 px-1.5 py-0.5 rounded border border-red-100"><i className="fa-solid fa-arrow-trend-down"></i>하락중</span>}
                              {trend === 'flat' && <span className="flex items-center gap-1 text-[10px] bg-gray-50 text-gray-500 px-1.5 py-0.5 rounded border border-gray-200"><i className="fa-solid fa-minus"></i>유지</span>}
                            </div>
                          </td>
                          <td className={`px-5 py-3 font-black whitespace-nowrap border-l-2 ${isCumWarning ? 'text-red-600 border-red-200 bg-red-50/40' : 'text-green-700 border-green-100 bg-green-50/30'}`}>
                            <div className="flex items-center gap-1.5">
                              {row.avgCumulativeRate ? `${Number(row.avgCumulativeRate.toFixed(2))}%` : '-'}
                              {isCumWarning && <i className="fa-solid fa-circle-exclamation text-red-500" title="가동률 40% 미만"></i>}
                            </div>
                          </td>
                          {Array.from({ length: maxMonths }, (_, i) => {
                            const rate = row.avgSeq[i];
                            const hasData = rate !== null && rate !== undefined;
                            const isWarning = hasData && rate < 40;
                            return (
                              <td key={`td-${idx}-${i}`} className={`px-4 py-3 text-center border-l border-gray-100 ${hasData ? (isWarning ? 'font-bold text-red-600 bg-red-50/20' : 'font-medium text-gray-800') : 'text-gray-300'}`}>
                                {hasData ? (
                                  <div className="flex items-center justify-center gap-1">
                                    {`${Number(rate.toFixed(2))}%`}
                                    {isWarning && <i className="fa-solid fa-circle-exclamation text-red-400 opacity-70"></i>}
                                  </div>
                                ) : '-'}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {filteredHospitals.length === 0 && (
                <div className="p-10 text-center text-gray-500">
                  해당 조건에 일치하는 데이터가 없습니다.
                </div>
              )}
            </div>
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

<span id="recharts_measurement_span" aria-hidden="true" style="position: absolute; top: -20000px; left: 0px; padding: 0px; margin: 0px; border: none; white-space: pre; font-size: 16px; letter-spacing: normal;">10%</span></body></html>
